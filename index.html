<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body {
      font-family: 'Inter', sans-serif;
      background: #edfaf4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px;
      background: rgba(237,250,244,0.85);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .user-info {
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #ccc; object-fit: cover;
      border: 1.5px solid rgba(0,0,0,0.1);
    }
    .user-avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #6b7280;
    }
    .user-name { font-size: 14px; font-weight: 500; color: #111; }
    .btn-logout {
      border: 1.5px solid #111; border-radius: 8px;
      background: transparent; color: #111;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      padding: 6px 16px; cursor: pointer; transition: background .15s, color .15s;
    }
    .btn-logout:hover { background: #111; color: #fff; }
    .btn-login {
      border: none; border-radius: 8px;
      background: #111; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      padding: 7px 18px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .82; }

    /* ── HERO ── */
    .hero {
      margin-top: 53px;
      background: #3dba8f;
      display: flex; align-items: center; justify-content: center;
      padding: 5rem 2rem;
    }
    .hero h1 {
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 3rem 2rem;
      flex: 1;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 1000px) and (min-width: 701px) { .grid { grid-template-columns: repeat(2,1fr); } }

    .card {
      background: #fff;
      border: 2px solid #111;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-decoration: none;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 600;
      letter-spacing: -0.02em;
      transition: background .18s, color .18s, transform .18s;
      cursor: pointer;
      min-height: 130px;
    }
    .card:hover { background: #111; color: #fff; transform: translateY(-3px); }
    .card:hover .card-icon { filter: invert(1); }
    .card-icon { font-size: 28px; transition: filter .18s; }

    .card-soon {
      background: #f9f9f9;
      border-color: #ccc;
      color: #aaa;
      cursor: default;
    }
    .card-soon:hover {
      background: #f9f9f9; color: #aaa;
      transform: none;
    }
    .card-soon:hover .card-icon { filter: none; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="user-info" id="userInfo">
      <div class="user-avatar-placeholder">?</div>
      <span class="user-name">กำลังโหลด...</span>
    </div>
    <div id="authAction"></div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>KanaHub</h1>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="grid">

      <a class="card" href="./subscription-tracker/">
        <span>Subscription</span>
        <span class="card-icon">💳</span>
      </a>

      <a class="card" href="./bookshelf/">
        <span>Bookshelf</span>
        <span class="card-icon">📚</span>
      </a>

      <div class="card card-soon">
        <span>Coming soon</span>
      </div>

    </div>
  </div>

  <!-- FIREBASE AUTH -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const app  = initializeApp({
      apiKey:            "AIzaSyDBOuyfHre1_CE3dWCkJuo7LLfiaFcBiys",
      authDomain:        "kanahub-a4f9a.firebaseapp.com",
      projectId:         "kanahub-a4f9a",
      storageBucket:     "kanahub-a4f9a.firebasestorage.app",
      messagingSenderId: "587364108316",
      appId:             "1:587364108316:web:21d46aba7b8382767977d9",
    });
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      const userInfo   = document.getElementById('userInfo');
      const authAction = document.getElementById('authAction');

      if (user) {
        userInfo.innerHTML = `
          <img class="user-avatar" src="${user.photoURL}" alt="avatar"/>
          <span class="user-name">${user.displayName}</span>
        `;
        authAction.innerHTML = `<button class="btn-logout" id="logoutBtn">Logout</button>`;
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
      } else {
        userInfo.innerHTML = `
          <div class="user-avatar-placeholder">👤</div>
          <span class="user-name" style="color:#888">ยังไม่ได้ login</span>
        `;
        authAction.innerHTML = `
          <button class="btn-login" id="loginBtn">
            <svg width="16" height="16" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.3 13 17.7 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
              <path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/>
              <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.6-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
            </svg>
            Login
          </button>
        `;
        document.getElementById('loginBtn').addEventListener('click', () => signInWithPopup(auth, provider));
      }
    });
  </script>

</body>
</html>
