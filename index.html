<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanaHub — Subscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="user-info" id="userInfo">
      <div class="user-avatar-placeholder">👤</div>
      <span class="user-name">กำลังโหลด...</span>
    </div>
    <div id="authAction"></div>
  </div>

  <!-- HERO -->
  <a class="hero" href="../">
    <h1>KanaHub</h1>
  </a>

  <!-- APP -->
  <div id="appContent" style="display:none">
    <div class="section-label">Subscription Tracker</div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="statMonthly">฿0</div><div class="stat-label">/เดือน</div></div>
      <div class="stat"><div class="stat-val" id="statYearly">฿0</div><div class="stat-label">/ปี</div></div>
      <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">ACTIVE</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="searchEl" placeholder="ค้นหา..."/>
      <button class="btn-add" id="addBtn">+ เพิ่ม</button>
      <span id="statusEl"></span>
    </div>

    <div id="alertEl"></div>
    <div class="cards-grid" id="gridEl"><div class="empty">กำลังโหลด...</div></div>
  </div>

  <!-- LOGIN -->
  <div id="loginScreen" style="display:none">
    <div class="login-box">
      <p>กรุณาเข้าสู่ระบบก่อนใช้งาน</p>
      <button class="btn-google" id="loginBtn2">
        <svg width="16" height="16" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.3 13 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
          <path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.6-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
        </svg>
        เข้าสู่ระบบด้วย Google
      </button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modalEl"></div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
