<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanaHub — Subscriptions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div>
      <div class="logo">Kana<em>Hub</em></div>
      <div class="logo-sub">subscription tracker</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="statMonthly">฿0</div>
        <div class="stat-label">/ เดือน</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statYearly">฿0</div>
        <div class="stat-label">/ ปี</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statCount">0</div>
        <div class="stat-label">active</div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="searchEl" placeholder="ค้นหา..."/>
    <button class="btn-add" id="addBtn">+ เพิ่ม</button>
  </div>

  <div id="alertEl"></div>
  <div class="cards-grid" id="gridEl"></div>

  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modalEl"></div>
  </div>

  <footer>KanaHub · data stored locally · drag to reorder</footer>

  <script src="script.js"></script>
</body>
</html>
